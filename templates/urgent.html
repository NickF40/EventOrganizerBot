{% extends "base.html" %}
{% block content %}
<h1>{{ localizer.get("admin.urgent.title") }}</h1>
<div class="card">
    <form method="post">
        <label>{{ localizer.get("admin.urgent.message_label") }}
            <textarea name="message" rows="4" required>{{ message or '' }}</textarea>
        </label>
        <button type="submit">{{ localizer.get("admin.urgent.send") }}</button>
    </form>
    {% if delivered is not none %}
        <p class="success">{{ localizer.format("admin.urgent.delivered", delivered=delivered) }}</p>
    {% endif %}
</div>
{% endblock %}
